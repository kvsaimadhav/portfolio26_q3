<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Thank You — Message Sent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg-main: #020617;
      --bg-card: #0f172a;
      --text-main: #e5e7eb;
      --muted: #94a3b8;
      --primary: #6366f1;
      --accent: #38bdf8;
      --success: #22c55e;
    }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background:
        radial-gradient(1200px 600px at top center, #0b122a, var(--bg-main));
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .thank-you-card {
      background: var(--bg-card);
      padding: 2.8rem 3rem;
      border-radius: 22px;
      text-align: center;
      border: 1px solid rgba(148,163,184,0.18);
      box-shadow:
        0 30px 80px rgba(0,0,0,.6),
        0 0 0 1px rgba(99,102,241,.15);
      animation: fadeUp 0.7s ease forwards;
      max-width: 420px;
    }

    .icon {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(34,197,94,0.15);
      color: var(--success);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 1rem;
    }

    h1 {
      margin: 0.4rem 0 0.6rem;
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--success);
    }

    p {
      margin: 0 0 1.8rem;
      color: var(--muted);
      line-height: 1.6;
      font-size: 1rem;
    }

    a {
      display: inline-block;
      padding: 0.65rem 1.4rem;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 10px 28px rgba(99,102,241,.35);
      transition: transform .2s ease, box-shadow .2s ease;
    }

    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(99,102,241,.45);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <div class="thank-you-card">
    <div class="icon">✓</div>
    <h1>Message Sent</h1>
    <p>
      Thanks for reaching out.  
      I’ve received your message and will get back to you shortly.
    </p>
    <a href="/">Back to Home</a>
  </div>

</body>
</html>

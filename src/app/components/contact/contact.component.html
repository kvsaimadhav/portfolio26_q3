<section class="contact-section" id="contact">
  <div class="contact-backdrop"></div>

  <div class="contact-card" [class.sending]="status === 'sending'">

    <div class="contact-header">
      <p class="section-tag">Let’s Work Together</p>
      <h2>Have an Idea? Let’s Build It 🚀</h2>

      <p class="subtitle">
        I help build scalable apps, cloud systems, and high-performance platforms.
      </p>

      <div class="quick-info">
        <span>⚡ Response within 24 hours</span>
        <span>🔒 100% Confidential</span>
      </div>
    </div>

    <div class="contact-highlight">
      💼 Open for freelance & consulting
    </div>

    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" (ngSubmit)="onSubmit()"
      novalidate>
      <!-- REQUIRED hidden field -->
      <input type="hidden" name="form-name" value="contact" />

      <!-- Spam protection -->
      <input type="hidden" name="bot-field" />

      <div class="inputs-grid">

        <label class="input-wrap">
          <input type="text" [(ngModel)]="name" name="name" placeholder=" " required />
          <span>Name</span>
        </label>

        <label class="input-wrap">
          <input type="email" [(ngModel)]="email" name="email" placeholder=" " required />
          <span>Email</span>
        </label>

        <label class="textarea-wrap">
          <textarea [(ngModel)]="message" name="message" rows="6" placeholder=" " required></textarea>
          <span>Your Message</span>
        </label>

      </div>

      <div class="submit-row">
        <button type="submit" [disabled]="!canSubmit || status === 'sending'" class="btn-primary">
          <span *ngIf="status !== 'sending'">🚀 Send My Request</span>
          <span *ngIf="status === 'sending'">Sending...</span>
        </button>

        <span class="form-hint" *ngIf="!canSubmit && status !== 'sending'">
          Fill all fields properly
        </span>
      </div>

      <div class="status-message">
        <p class="success" *ngIf="status === 'success'">
          🎉 Thanks! I’ll get back to you soon.
        </p>
        <p class="error" *ngIf="status === 'error'">
          {{ errorMessage }}
        </p>
      </div>
    </form>
  </div>
</section>

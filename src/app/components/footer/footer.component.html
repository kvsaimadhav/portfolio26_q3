<footer class="site-footer">

  <div class="footer-grid">

    <!-- BRAND -->
    <div class="brand-block">
      <h3 class="brand-title">Sai Madhav</h3>
      <p class="brand-tag">Cloud • Full Stack • Scalable Systems</p>

      <!-- STATUS -->
      <div class="status">
        <span class="dot" [class.online]="isOnline"></span>
        <span>{{ isOnline ? 'Available for work' : 'Offline' }}</span>
      </div>

      <!-- THEME TOGGLE
      <button class="theme-toggle" (click)="toggleTheme()">
        {{ theme === 'dark' ? '☀️ Light Mode' : '🌙 Dark Mode' }}
      </button> -->
    </div>

    <!-- NEWSLETTER -->
    <div class="block">
      <p class="block-title">Newsletter</p>

      <div class="newsletter">
        <input type="email" placeholder="Your email" [(ngModel)]="email" />
        <button (click)="subscribe()">Join</button>
      </div>

      <p *ngIf="subscribed" class="sub-msg">✅ Subscribed!</p>
    </div>

    <!-- SOCIAL -->
    <div class="block">
      <p class="block-title">Connect</p>

      <div class="social-links">
        <a *ngFor="let link of socialLinks" [href]="link.url" target="_blank">
          <img [src]="'assets/icons/' + link.icon + '.svg'" class="icon" />
          <span>{{ link.name }}</span>
        </a>
      </div>
    </div>

    <!-- GITHUB -->
    <div class="block">
      <p class="block-title">GitHub Activity</p>

      <!-- Contributions graph -->
      <img
        class="github-graph"
        src="https://github-readme-activity-graph.vercel.app/graph?username=kvsaimadhav&theme=github-dark"
        alt="GitHub contributions"
      />
    </div>

  </div>

  <div class="footer-credit">
    © {{ year }} Sai Madhav · Built with performance & clarity
  </div>

  <!-- BACK TO TOP -->
  <button class="scroll-top" *ngIf="showScrollTop" (click)="scrollToTop()">↑</button>

  <!-- WHATSAPP -->
  <a
    class="whatsapp-float"
    href="https://wa.me/917702596857"
    target="_blank"
  >
    💬
  </a>

</footer>

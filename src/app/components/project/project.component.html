<section class="projects-section" id="projects">
  <div class="section-head">
    <div>
      <p class="section-tag">Developer Profile</p>
      <h2>Projects & Case Studies</h2>
      <p>Modern full-stack works with scalable architecture, cloud automation, and product-first design.</p>
    </div>

    <div class="project-stats">
      <div class="stat-card">
        <div class="stat-value">{{ projectCount }}</div>
        <div class="stat-label">Total Projects</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">{{ completedCount }}</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">{{ inProgressCount }}</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">{{ technologyCount }}</div>
        <div class="stat-label">Tech Stack</div>
      </div>
    </div>
  </div>

  <div class="project-filterbar" aria-label="Project category filters">
    <button *ngFor="let category of categories"
              type="button"
              [class.active]="activeFilter === category.id"
              (click)="filterProjects(category.id)"
              [attr.aria-pressed]="activeFilter === category.id">
      <span>{{ category.icon }}</span>
      <span>{{ category.name }}</span>
    </button>
  </div>

  <div class="projects-grid" #projectsRoot role="list" aria-live="polite"></div>
</section>
